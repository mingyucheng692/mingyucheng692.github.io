baseURL: "https://intent.me/"
languageCode: "en-us"
title: "Intent"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
hasCJKLanguage: true

# Multilingual Configuration
defaultContentLanguage: en-us
defaultContentLanguageInSubdir: true
languages:
  en-us:
    languageName: "English"
    weight: 1
    title: "Intent"
    params:
      profileMode:
        enabled: true
        title: "Intent"
        subtitle: "Linux C++ · EMS Storage · Protocol Gateway"
        imageUrl: "/images/avatar-github-cat.png"
        imageWidth: 120
        imageHeight: 120
        buttons:
          - name: "Overview"
            url: "profile"
          - name: "Project"
            url: "projects"
          - name: "Blog"
            url: "categories"
    menu:
      main:
        - identifier: tags
          name: "Tags"
          url: "tags/"
          weight: 48
        - identifier: search
          name: "Search"
          url: "search/"
          weight: 50
  zh-cn:
    languageName: "简体中文"
    weight: 2
    title: "Intent"
    params:
      profileMode:
        enabled: true
        title: "Intent"
        subtitle: "Linux C++ · EMS 储能 · 协议网关"
        imageUrl: "/images/avatar-github-cat.png"
        imageWidth: 120
        imageHeight: 120
        buttons:
          - name: "概况"
            url: "profile"
          - name: "项目"
            url: "projects"
          - name: "博客"
            url: "categories"
    menu:
      main:
        - identifier: tags
          name: "标签"
          url: "tags/"
          weight: 48
        - identifier: search
          name: "搜索"
          url: "search/"
          weight: 50
  zh-tw:
    languageName: "繁體中文"
    weight: 3
    title: "Intent"
    params:
      profileMode:
        enabled: true
        title: "Intent"
        subtitle: "Linux C++ · EMS 儲能 · 協議閘道"
        imageUrl: "/images/avatar-github-cat.png"
        imageWidth: 120
        imageHeight: 120
        buttons:
          - name: "概況"
            url: "profile"
          - name: "專案"
            url: "projects"
          - name: "博客"
            url: "categories"
    menu:
      main:
        - identifier: tags
          name: "標籤"
          url: "tags/"
          weight: 48
        - identifier: search
          name: "搜尋"
          url: "search/"
          weight: 50

minify:
  disableXML: true
  minifyOutput: true

params:
  displayFullLangName: true
  env: production
  description: "Industrial communication, protocol systems, edge gateway software, and energy digitalization."
  author: "Intent"
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  UseHugoToc: true
  
  # Assets
  assets:
    favicon: "/favicon-tech.svg" # Options: /favicon-avatar.png, /favicon-tech-transparent.svg, /favicon-tech.svg, /favicon.ico

  # Social Icons (Global)
  socialIcons:
    - name: github
      url: "https://github.com/mingyucheng692"
    - name: email
      url: "#" # Placeholder, actual link is handled via JS obfuscation in layouts/partials/social_icons.html

  # Feature Flags for extended functionalities
  math: true    # Custom param to toggle KaTeX in templates
  mermaid: true # Custom param to toggle Mermaid in templates

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true # Required for Mermaid integration via raw HTML if needed
  highlight:
    noClasses: false
